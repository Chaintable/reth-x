name: "Build new ext"

on:
  pull_request:
    branches:
      - 'debank'
  workflow_dispatch:

env:
  REGISTRY: 294354037686.dkr.ecr.ap-northeast-1.amazonaws.com
  IMAGE: reth-x
  DOCKERFILE: Dockerfile

jobs:
  build-artifacts:
    strategy:
      matrix:
        arch: [ amd64 ]
    runs-on: [self-hosted, "${{ matrix.arch }}"]
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set env
        run: |
          echo "REVISION=$(git rev-parse --short=7 HEAD)" >> $GITHUB_ENV
      - name: Docker build and push
        run: |
          git submodule update --init --recursive
          docker build -t ${REGISTRY}/${IMAGE}:${{ matrix.arch }}-${REVISION} -f ${DOCKERFILE} .
          docker push ${REGISTRY}/${IMAGE}:${{ matrix.arch }}-${REVISION}
          